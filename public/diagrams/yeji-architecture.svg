<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 720" font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#BABABA"/>
    </marker>
    <style>
      .box { fill: #1f2020; stroke-width: 1.5; rx: 6; ry: 6; }
      .line { stroke: #BABABA; stroke-width: 1.5; fill: none; }
      .lbl { fill: #CCCCCC; text-anchor: middle; }
      .sub { fill: #9CA3AF; font-size: 11px; text-anchor: middle; }
      .cluster { fill: #2B2B2B; stroke: #5E6060; stroke-width: 1; rx: 8; ry: 8; }
      .cluster-title { fill: #BABABA; font-size: 12px; text-anchor: start; }
      .elabel { fill: #BABABA; font-size: 11px; text-anchor: middle; }
      .highlight { fill: #F9FAFB; font-weight: 700; }
    </style>
  </defs>

  <!-- CLIENT -->
  <g>
    <rect class="box" x="340" y="30" width="160" height="60" stroke="#61DAFB"/>
    <text class="lbl highlight" x="420" y="56">React 19 Client</text>
    <text class="sub" x="420" y="76">Framer Motion · R3F · Axios</text>
  </g>

  <path class="line" d="M 420 92 L 420 130" marker-end="url(#arrow)"/>
  <text class="elabel" x="490" y="116">HTTPS + SSE</text>

  <!-- NGINX -->
  <g>
    <rect class="box" x="340" y="130" width="160" height="50" stroke="#009639"/>
    <text class="lbl highlight" x="420" y="162">Nginx Reverse Proxy</text>
  </g>

  <path class="line" d="M 420 182 L 420 215" marker-end="url(#arrow)"/>

  <!-- SPRING BOOT CLUSTER -->
  <rect class="cluster" x="30" y="215" width="780" height="310"/>
  <text class="cluster-title" x="48" y="238">Spring Boot 3.4 · Java 21</text>

  <g>
    <rect class="box" x="280" y="255" width="280" height="62" stroke="#6DB33F"/>
    <text class="lbl highlight" x="420" y="281">Controller</text>
    <text class="sub" x="420" y="302">returns Flux&lt;ServerSentEvent&gt;</text>
  </g>

  <path class="line" d="M 420 319 L 420 355" marker-end="url(#arrow)"/>

  <g>
    <rect class="box" x="170" y="355" width="500" height="90" stroke="#6DB33F"/>
    <text class="lbl highlight" x="420" y="379">Service Layer · 12 Domains</text>
    <text class="sub" x="420" y="398">user · saju · unse · card · collection · compatibility</text>
    <text class="sub" x="420" y="414">friend · event · luck · session · shop · wallet</text>
    <text class="sub" x="420" y="432">shop ↔ wallet ↔ collection  (@Transactional)</text>
  </g>

  <path class="line" d="M 260 447 Q 160 470 150 485" marker-end="url(#arrow)"/>
  <path class="line" d="M 420 447 L 420 485" marker-end="url(#arrow)"/>
  <path class="line" d="M 580 447 Q 680 470 690 485" marker-end="url(#arrow)"/>
  <text class="elabel" x="180" y="470">tx 밖</text>
  <text class="elabel" x="440" y="472">@Transactional</text>

  <g>
    <rect class="box" x="60" y="485" width="180" height="56" stroke="#009688"/>
    <text class="lbl highlight" x="150" y="510">WebClient</text>
    <text class="sub" x="150" y="528">Flux&lt;SSE&gt; · doOnCancel</text>
  </g>

  <g>
    <rect class="box" x="330" y="485" width="180" height="56" stroke="#6DB33F"/>
    <text class="lbl highlight" x="420" y="510">JPA Repository</text>
    <text class="sub" x="420" y="528">Entity · fetch join</text>
  </g>

  <g>
    <rect class="box" x="600" y="485" width="180" height="56" stroke="#F97316"/>
    <text class="lbl highlight" x="690" y="510">JWT Filter</text>
    <text class="sub" x="690" y="528">Access · stateless</text>
  </g>

  <path class="line" d="M 150 541 L 150 600" marker-end="url(#arrow)"/>
  <path class="line" d="M 420 541 L 420 600" marker-end="url(#arrow)"/>
  <path class="line" d="M 690 541 L 690 600" marker-end="url(#arrow)"/>

  <!-- EXTERNAL / DATA -->
  <g>
    <rect class="box" x="60" y="600" width="180" height="74" stroke="#FF6F00"/>
    <text class="lbl highlight" x="150" y="626">AI Server (vLLM)</text>
    <text class="sub" x="150" y="646">Qwen3 4B AWQ · GPU g6.xlarge</text>
    <text class="sub" x="150" y="662">token streaming</text>
  </g>

  <g>
    <rect class="box" x="330" y="600" width="180" height="74" stroke="#336791"/>
    <text class="lbl highlight" x="420" y="626">PostgreSQL 16</text>
    <text class="sub" x="420" y="646">AWS RDS · JSONB</text>
    <text class="sub" x="420" y="662">12 domain tables</text>
  </g>

  <g>
    <rect class="box" x="600" y="600" width="180" height="74" stroke="#DC382D"/>
    <text class="lbl highlight" x="690" y="626">Redis</text>
    <text class="sub" x="690" y="646">Refresh Token (rotation)</text>
    <text class="sub" x="690" y="662">+ Session · Cache</text>
  </g>

  <text class="elabel" x="210" y="575">SSE · doOnCancel</text>
  <text class="elabel" x="475" y="575">SQL</text>
  <text class="elabel" x="755" y="575">DEL · TTL</text>
</svg>
